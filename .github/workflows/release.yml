name: Release (per-OS portable artifacts)

# This workflow proves the packaging matrix promised by
# `docs/dev/plans/phase-01-system-foundation.md` §12. It does **not**
# run on every PR — phase 1 is not shipping releases yet. Trigger
# manually via `workflow_dispatch`, or automatically when a `v*` tag
# lands. See ADR 0004 and the packaging follow-up:
#   - docs/dev/decisions/0004-electron-as-thin-wrapper.md
#   - docs/dev/follow-ups/electron-builder-ci-matrix.md

on:
  workflow_dispatch:
  push:
    tags:
      - 'v*'

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: false

jobs:
  package:
    name: package — ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: macos-latest
            artifact_glob: |
              apps/desktop/release/*.dmg
              apps/desktop/release/*.zip
          - os: ubuntu-latest
            artifact_glob: |
              apps/desktop/release/*.AppImage
              apps/desktop/release/*.tar.gz
          - os: windows-latest
            artifact_glob: |
              apps/desktop/release/*portable*.exe
              apps/desktop/release/*.zip
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: 1.3.13

      - name: Install
        run: bun install --frozen-lockfile

      # `bun run package` chains:
      #   1. package:prepare → builds web + server bundles + fetches the
      #      host's Bun runtime under apps/desktop/vendor/bun/.
      #   2. electron-builder → produces per-OS artifacts under
      #      apps/desktop/release/.
      - name: Package
        run: bun run package

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: bunny2-${{ matrix.os }}
          path: ${{ matrix.artifact_glob }}
          if-no-files-found: error
          retention-days: 14
