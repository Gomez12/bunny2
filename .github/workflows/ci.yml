name: CI

on:
  push:
    branches: [main]
  pull_request:

# Cancel superseded runs on the same ref to keep the matrix lean.
concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  checks:
    name: ${{ matrix.os }} — format / lint / typecheck / test / build
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4

      - uses: oven-sh/setup-bun@v2
        with:
          # Matches `engines.bun` in package.json (`>=1.3.0`). We pin a
          # concrete version per workflow run so a Bun release does not
          # silently change matrix behaviour. Bump deliberately.
          bun-version: 1.3.13

      - name: Install
        run: bun install --frozen-lockfile

      - name: Format check
        run: bun run format:check

      - name: Lint
        run: bun run lint

      - name: Typecheck
        run: bun run typecheck

      - name: Test
        run: bun test

      - name: i18n check
        run: bun run i18n:check

      - name: Docs check
        run: bun run docs:check

      - name: Build
        run: bun run build
